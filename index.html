<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reva</title>
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>

    <main>
        <section id="herosection">
            <div class="container">
                <div class="mainpage">
                    <!-- left side -->
                    <div class="left-vertical">
                        <!-- left icon -->
                        <div class="left-side-icon">
                            <div class="border-and-color">
                                <i class="fa-solid fa-angle-left "></i>
                            </div>
                        </div>
                        <!-- logo        -->
                        <div class="logo">
                            <img src="./assets/images/dark-logo.png" alt="Logo">
                        </div>
                        <!-- nav elements -->
                        <div class="navbar">
                            <nav>
                                <ul>

                                    <li class="flex-center"><i class="fas fa-home"></i>
                                        <p> Home</p>
                                    </li>
                                    <li class="flex-center"><i class="far fa-user"></i>
                                        <p>About</p>
                                    </li>
                                    <li class="flex-center">
                                        <i class="far fa-list-alt"></i>
                                        <p>Services</p>
                                    </li>
                                    <li class="flex-center"><i class="far fa-image"></i>
                                        <p>Portfolio</p>
                                    </li>
                                    <li class="flex-center"><i class="far fa-comment-dots"></i>
                                        <p>Testimonials</p>
                                    </li>
                                    <li class="flex-center"><i class="far fa-envelope"></i>
                                        <p>Contact</p>
                                    </li>
                                </ul>

                            </nav>
                        </div>
                        <!-- color buttons -->
                        <div class="color-btn">
                            <div><button>Teal</button></div>
                            <div><button>Purple</button></div>
                            <div><button>Green </button></div>
                        </div>
                        <!-- Social links -->
                        <div class="links">
                            <i class="fa-brands fa-facebook-f"></i>
                            <i class="fa-brands fa-twitter"></i>
                            <i class="fab fa-tumblr"></i>
                            <i class="fa-brands fa-youtube"></i>
                            <i class="fa-brands fa-instagram"></i>
                        </div>


                    </div>
                    <!-- right side -->
                    <div class="right-mainpage">
                        <div class="center-margin">
                            <h2>REVA <span class="span-weight">SMITH</span></h2>
                            <div class="moveable-text">Frontend Developer</div>
                            <div class="main-btn">
                                <a href="#">Portfolio</a>
                            </div>
                        </div>



                        <!-- positions arrow -->
                        <div class="positions-arrow">
                            <button type="button">
                                <i class="fa-solid fa-angle-left"></i>
                            </button>
                            <button type="button">
                                <i class="fa-solid fa-angle-left fa-rotate-180"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </section>
        <!-- ######################### HOME PAGE ######################### -->


    </main>





    <script src="./assets/js/script.js"></script>
</body>

</html>
